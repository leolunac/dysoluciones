<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nueva llamada</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:850px;
    margin:auto;
    background:white;
    padding:22px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
    color:#003366;
}

label{
    font-weight:bold;
    display:block;
    margin-top:12px;
}

input, select, textarea{
    width:100%;
    padding:9px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-top:4px;
}

.btn{
    margin-top:18px;
    background:#003366;
    color:white;
    border:none;
    padding:11px 18px;
    border-radius:6px;
    cursor:pointer;
}

.frase{
    margin-top:25px;
    font-size:13px;
    color:#555;
    border-top:1px solid #ddd;
    padding-top:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>📞 Nueva llamada / Nuevo servicio</h1>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn" type="submit">
        💾 Registrar servicio
    </button>
</form>

<div class="frase">
    “El sistema no existe para registrar servicios; existe para garantizar que ningún servicio pierda su seguimiento.”
</div>

</div>

</body>
</html>
