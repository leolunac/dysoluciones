<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:20px;
    border-radius:8px;
    width:280px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:15px;
    font-size:18px;
}

input{
    width:100%;
    padding:8px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:13px;
}

button{
    width:100%;
    padding:8px;
    margin-top:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    font-size:13px;
}

.error{
    color:red;
    font-size:12px;
    text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h2>Ingreso</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Usuario">
<input type="password" name="password" placeholder="Contraseña">

<button type="submit">Entrar</button>

</form>

</div>

</body>
</html>
