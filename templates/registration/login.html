<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h2>Ingreso al sistema</h2>

{% if form.errors %}
<p style="color:red;">Usuario o contraseña incorrectos</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    
    <p>
        <label>Usuario:</label>
        {{ form.username }}
    </p>

    <p>
        <label>Contraseña:</label>
        {{ form.password }}
    </p>

    <button type="submit">Ingresar</button>
</form>

</body>
</html>
